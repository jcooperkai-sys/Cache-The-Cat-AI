name: build and release checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=low
      - run: npm run build
      - run: npm run verify:release
      - uses: actions/upload-artifact@v4
        with:
          name: Cache-AI-Kitty-Companion-Windows
          path: |
            dist/DesktopPet.exe
            dist/CacheAI-Setup-*.exe
          if-no-files-found: error
