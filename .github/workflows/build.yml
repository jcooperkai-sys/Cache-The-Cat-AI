name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=low
      - run: npm run build
      - run: npm run verify:release
      - uses: actions/upload-artifact@v4
        with:
          name: DesktopPet
          path: dist/DesktopPet.exe
